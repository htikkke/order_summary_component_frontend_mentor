<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Summary</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="image-container">
        <img src="images/illustration-hero.svg" />
      </div>
      <div class="words-container">
        <h3>Order Summary</h3>
        <p>
          You can now listen to millions of songs,<br />
          audiobooks, and podcasts on any device anywhere you like!
        </p>
        <div class="annual-plan">
          <div class="plan-details">
            <img src="images/icon-music.svg" alt="" />
            <div>
              <strong>Annual Plan</strong>
              <p>$59.99/year</p>
            </div>
          </div>
          <a href="#" class="link">Change</a>
        </div>
        <button class="proceed-button">Proceed to Payment</button>
        <button class="cancel-button">Cancel Order</button>
      </div>
    </div>
  </body>
</html>
